# Development overlay with hot reload via cargo watch.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  kernel:
    build:
      target: dev
    volumes:
      - .:/app
      - wattswarm_cargo_target:/app/target
      - wattswarm_cargo_registry:/usr/local/cargo/registry
      - wattswarm_state_data:/var/lib/wattswarm
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        exec /bin/sh /app/scripts/docker-kernel-hot-entrypoint.sh

  runtime:
    build:
      target: dev
    volumes:
      - .:/app
      - wattswarm_cargo_target:/app/target
      - wattswarm_cargo_registry:/usr/local/cargo/registry
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        exec cargo watch
        --poll
        --watch Cargo.toml
        --watch Cargo.lock
        --watch apps
        --watch crates
        --ignore target
        --shell "cargo run -p wattswarm-runtime-app --bin wattswarm-runtime -- --listen 0.0.0.0:8787"

  worker:
    build:
      target: dev
    volumes:
      - .:/app
      - wattswarm_cargo_target:/app/target
      - wattswarm_cargo_registry:/usr/local/cargo/registry
      - wattswarm_state_data:/var/lib/wattswarm
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        exec cargo watch
        --poll
        --watch Cargo.toml
        --watch Cargo.lock
        --watch apps
        --watch crates
        --ignore target
        --shell "cargo run --bin wattswarm -- --state-dir \"$$WATTSWARM_STATE_DIR\" --store \"$$WATTSWARM_STORE_NAME\" run --pg-url \"$$WATTSWARM_PG_URL\" worker --concurrency \"$$WATTSWARM_WORKER_CONCURRENCY\" --poll-ms \"$$WATTSWARM_WORKER_POLL_MS\" --lease-ms \"$$WATTSWARM_WORKER_LEASE_MS\""

volumes:
  wattswarm_cargo_target:
  wattswarm_cargo_registry:
