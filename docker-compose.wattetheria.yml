# Overlay for joint deployment with Wattetheria.
#
# Usage:
#   docker network create watt-net
#   docker compose -f docker-compose.yml -f docker-compose.wattetheria.yml up -d
#
# This adds a shared external network and enables the gRPC sync service
# that Wattetheria connects to. It also lets the runtime reuse the
# Wattetheria deploy env written into the shared Wattetheria state volume.

services:
  kernel:
    environment:
      WATTSWARM_WATTETHERIA_SYNC_GRPC_LISTEN: "0.0.0.0:7791"
    ports:
      - "${WATTSWARM_SYNC_GRPC_PORT:-7791}:7791"
    volumes:
      - wattetheria_state:/var/lib/wattetheria:ro
    networks:
      - default
      - watt-net

  postgres:
    networks:
      - default

  runtime:
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -a
        [ -f /var/lib/wattetheria/deploy/.env ] && . /var/lib/wattetheria/deploy/.env
        set +a
        if [ "$#" -eq 1 ]; then
          exec /bin/sh -c "$1"
        fi
        exec /app/target/release/wattswarm-runtime "$@"
      - --
    volumes:
      - wattetheria_state:/var/lib/wattetheria:ro
    networks:
      - default

  worker:
    networks:
      - default

networks:
  watt-net:
    external: true

volumes:
  wattetheria_state:
    external: true
    name: wattetheria_wattetheria_state
