name: publish-ghcr

on:
  workflow_dispatch:
    inputs:
      release:
        description: Wattswarm image tag to publish.
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Wattswarm GHCR images
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      RELEASE: ${{ inputs.release }}
      GITHUB_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}

    steps:
      - name: Validate release inputs
        env:
          CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          if [ -z "${RELEASE}" ]; then
            echo "release input is required" >&2
            exit 1
          fi
          if [ "${RELEASE}" = "latest" ]; then
            echo "release input must be a version tag, not latest" >&2
            exit 1
          fi
          if [ -z "${CROSS_REPO_TOKEN}" ]; then
            echo "CROSS_REPO_TOKEN is required for GHCR push and private dependency fetches" >&2
            exit 1
          fi

      - name: Checkout Wattswarm
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          builder: watt-builder

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CROSS_REPO_TOKEN }}

      - name: Publish Wattswarm images
        run: scripts/publish-ghcr.sh

      - name: Update latest image tags
        run: |
          set -euo pipefail
          for image in \
            ghcr.io/wattetheria/wattswarm-kernel \
            ghcr.io/wattetheria/wattswarm-runtime \
            ghcr.io/wattetheria/wattswarm-worker
          do
            docker buildx imagetools create \
              -t "${image}:latest" \
              "${image}:${RELEASE}"
          done
