<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wattswarm Dashboard</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png">
  <style>
    /*__SWARM_THEME_CSS__*/

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 32px 24px; }
    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      padding: 24px;
    }
    h1 { margin: 0 0 10px; font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; font-family: var(--font-head); }
    p { margin: 8px 0; line-height: 1.6; color: var(--muted); }
    code {
      background: var(--surface-alt);
      padding: 2px 7px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      font-family: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 0.86em;
      color: var(--accent-strong);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>WattSwarm Dashboard</h1>
      <p>This page is served by <code>/swarm</code>.</p>
      <p>State API: <code>GET /api/swarm/state</code></p>
      <p>Tick API: <code>POST /api/swarm/tick</code></p>
    </div>
  </div>
  <script>
    (function () {
      const themeOptions = ["forest", "matcha", "butter", "chocolate"];
      let theme = "matcha";
      try {
        const saved = JSON.parse(localStorage.getItem("wattswarm-console") || "{}") || {};
        if (themeOptions.includes(saved.theme)) theme = saved.theme;
      } catch (_) {}
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
</body>
</html>
